version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  cypress:
    image: cypress/included:13.6.0
    depends_on:
      - app
    environment:
      - CYPRESS_BASE_URL=http://app:3000
    volumes:
      - .:/app
    working_dir: /app
    entrypoint: ["cypress", "run"]
